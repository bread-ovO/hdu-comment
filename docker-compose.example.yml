services:
  backend:
    build:
      context: ./backend
    container_name: hdu-dp-backend
    environment:
      APP_SERVER_PORT: "8080"
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET:?JWT_SECRET environment variable is required}
      APP_AUTH_ACCESS_TOKEN_TTL: "15m"
      APP_AUTH_REFRESH_TOKEN_TTL: "168h"

      # QQ OAuth
      APP_AUTH_QQ_ENABLED: ${APP_AUTH_QQ_ENABLED:-false}
      APP_AUTH_QQ_APP_ID: ${APP_AUTH_QQ_APP_ID:-}
      APP_AUTH_QQ_APP_SECRET: ${APP_AUTH_QQ_APP_SECRET:-}
      APP_AUTH_QQ_REDIRECT_URI: ${APP_AUTH_QQ_REDIRECT_URI:-http://localhost:5173/login}

      # WeChat Mini Program login
      APP_AUTH_WECHAT_ENABLED: ${APP_AUTH_WECHAT_ENABLED:-false}
      APP_AUTH_WECHAT_APP_ID: ${APP_AUTH_WECHAT_APP_ID:-}
      APP_AUTH_WECHAT_SECRET: ${APP_AUTH_WECHAT_SECRET:-}

      # SMS login (dev mode returns debug_code for local testing)
      APP_AUTH_SMS_ENABLED: ${APP_AUTH_SMS_ENABLED:-true}
      APP_AUTH_SMS_CODE_TTL: ${APP_AUTH_SMS_CODE_TTL:-10m}
      APP_AUTH_SMS_DEV_MODE: ${APP_AUTH_SMS_DEV_MODE:-true}

      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-local}
      APP_STORAGE_UPLOAD_DIR: ${APP_STORAGE_UPLOAD_DIR:-/app/uploads}
      APP_STORAGE_PUBLIC_BASE_URL: ${APP_STORAGE_PUBLIC_BASE_URL:-/api/v1/uploads}

    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: hdu-dp-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-uploads:
